# Builds the signed Google Play App Bundle (courier flavor) and uploads it to
# the Play Console internal track on tag pushes.
#
# Required repository secrets:
#   COURIER_KEYSTORE_BASE64    base64 of your upload keystore (see keystore setup)
#   COURIER_STORE_PASSWORD     keystore password
#   COURIER_KEY_ALIAS          key alias
#   COURIER_KEY_PASSWORD       key password
#   PLAY_SERVICE_ACCOUNT_JSON  Google Play Developer API service-account JSON
#                              (optional: if absent, the AAB is built and
#                              uploaded as a workflow artifact but not sent to Play)
#
# Note: the very first Play release must be created manually in the Play Console
# (the package com.sidx255.courier must already exist). Subsequent tag pushes
# publish automatically to the internal track as a draft.

name: Play Store Release

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  playRelease:
    runs-on: ubuntu-latest
    env:
      HAS_PLAY_SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Read Go version from project
        run: echo "GO_VERSION=$(grep -E '^com\.sidx255\.courier\.extract\.goVersion=' gradle.properties | cut -d'=' -f2)" >> "$GITHUB_ENV"
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Set up Go from gradle.properties
        uses: actions/setup-go@v4
        with:
          go-version: '${{env.GO_VERSION}}'
        id: go
      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v3
      - name: Install NDK from gradle.properties
        run: |
          NDK_VERSION="$(grep -E "^com\.sidx255\.courier\.extract\.ndkVersion=" gradle.properties | cut -d'=' -f2)"
          sdkmanager "ndk;${NDK_VERSION}"
      - name: Restore Courier signing key
        env:
          COURIER_KEYSTORE_BASE64: ${{ secrets.COURIER_KEYSTORE_BASE64 }}
          COURIER_STORE_PASSWORD: ${{ secrets.COURIER_STORE_PASSWORD }}
          COURIER_KEY_ALIAS: ${{ secrets.COURIER_KEY_ALIAS }}
          COURIER_KEY_PASSWORD: ${{ secrets.COURIER_KEY_PASSWORD }}
        run: |
          test -n "$COURIER_KEYSTORE_BASE64"
          test -n "$COURIER_STORE_PASSWORD"
          test -n "$COURIER_KEY_ALIAS"
          test -n "$COURIER_KEY_PASSWORD"
          echo "$COURIER_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/courier-release.jks"
      - name: Build signed Play App Bundle
        env:
          COURIER_KEYSTORE: ${{ runner.temp }}/courier-release.jks
          COURIER_STORE_PASSWORD: ${{ secrets.COURIER_STORE_PASSWORD }}
          COURIER_KEY_ALIAS: ${{ secrets.COURIER_KEY_ALIAS }}
          COURIER_KEY_PASSWORD: ${{ secrets.COURIER_KEY_PASSWORD }}
        run: ./gradlew :app:bundleCourierRelease
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: courier-playstore-aab
          path: app/build/outputs/bundle/courierRelease/*.aab
          retention-days: 30
      - name: Upload to Google Play (internal track, draft)
        if: env.HAS_PLAY_SA == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.sidx255.courier
          releaseFiles: app/build/outputs/bundle/courierRelease/*.aab
          track: internal
          status: draft
